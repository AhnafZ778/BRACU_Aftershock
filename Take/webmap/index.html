<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dhaka Dengue Operations Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <section class="brand">
          <h1 class="title">Dhaka Dengue Ops Atlas</h1>
          <p class="subtitle">
            Toggle extracted layers and inspect real map context by DNCC + DSCC boundary.
          </p>
          <div class="status-strip">
            <span class="badge live">LIVE LAYER API</span>
            <span class="badge" id="active-count">Active: 0</span>
          </div>
        </section>

        <div id="layer-groups"></div>

        <p class="hint">
          Buildings are heavy and streamed by current map extent with a feature cap for browser stability.
        </p>
      </aside>

      <section class="map-wrap">
        <div id="map"></div>
        <div id="toast" class="toast">Ready</div>
      </section>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
